<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>

    <link rel="stylesheet" href="style.css">


</head>

<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>



    <script type="text/babel">
        const { useState } = React;

        const ReactApp = () => {
            return (
                <main>
                    <h1>I miei animali Preferiti</h1>
                    <figure>
                        <img src="https://picsum.photos/400/300" alt="Immagine Casuale" />
                    </figure>
                    <ListaAnimaleComponent />
                </main>
            );
        };
        const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];
        const ListaAnimaleComponent = () => {
            const [animals, setAnimals] = React.useState([]);
            const pescaAnimale = () => {
                const indiceCasuale = Math.floor(Math.random() * animalsChoices.length);
                const animaleCasuale = animalsChoices[indiceCasuale];
                setAnimals([...animals, animaleCasuale]);
            }

            return (

                <div className="lista-animali">
                    <button onClick={pescaAnimale}>Aggiungi Animale</button>
                    <details>
                        <summary>Animali</summary>
                        <ul>
                            {animals.map((animal, index) => (<li key={index}>{animal}</li>))}
                        </ul>
                    </details>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ReactApp />);
    </script>















    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
